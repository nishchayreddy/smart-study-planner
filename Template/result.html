<!DOCTYPE html>
<html>
<head>
    <title>Your Plan</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f8;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .day-card {
            background: white;
            padding: 15px;
            margin: 15px auto;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin: 8px 0;
            font-size: 16px;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>

<body>

<h2>📅 Your Study Plan</h2>

{% for day in plan %}
    <div class="day-card">
        <h3>Day {{ day.day }}</h3>
        <ul>
            {% for task in day.tasks %}
                <li>
                    <input type="checkbox" onclick="markDone(this)">
                    <span>{{ task.subject }} → {{ task.hours }} hrs</span>
                </li>
            {% endfor %}
        </ul>
    </div>
{% endfor %}

<a href="/">⬅ Back</a>

<script>
function markDone(checkbox) {
    const text = checkbox.nextElementSibling;

    if (checkbox.checked) {
        text.style.textDecoration = "line-through";
        text.style.color = "gray";
    } else {
        text.style.textDecoration = "none";
        text.style.color = "black";
    }
}
</script>

</body>
</html>
